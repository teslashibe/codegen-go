name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache-dependency-path: go.sum
      - run: go mod download
      - run: go vet ./...
      - run: go build ./...
      - run: go test ./...
      - name: gofmt
        run: |
          if [ -n "$(gofmt -l .)" ]; then
            echo "Unformatted files:"
            gofmt -l .
            exit 1
          fi
